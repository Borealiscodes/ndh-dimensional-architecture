<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1600"
  height="900"
  viewBox="0 0 1600 900">

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="900" fill="#05060A"/>

  <!-- Title -->
  <text x="800" y="70"
        fill="#F5F7FF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="32"
        text-anchor="middle">
    NDH Dimensional Behavior Codex — v1.0
  </text>

  <!-- Subtitle -->
  <text x="800" y="110"
        fill="#C3C7FF"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="18"
        text-anchor="middle">
    Behavioral Grammar Across NDH Dimensional Forms
  </text>

  <!-- Node Style -->
  <defs>
    <marker id="arrow"
            markerWidth="10"
            markerHeight="10"
            refX="8"
            refY="3"
            orient="auto"
            markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C3C7FF"/>
    </marker>
  </defs>

  <!-- Layout: 7 behavior nodes arranged like the Identity Atlas -->

  <!-- Awareness Behavior -->
  <circle cx="200" cy="450" r="70" fill="#141824" stroke="#F5F7FF" stroke-width="2"/>
  <text x="200" y="445"
        fill="#F5F7FF"
        font-family="system-ui"
        font-size="30"
        text-anchor="middle">𝒜</text>
  <text x="200" y="475"
        fill="#C3C7FF"
        font-family="system-ui"
        font-size="14"
        text-anchor="middle">Awareness Behavior</text>

  <!-- Collapse Behavior -->
  <circle cx="380" cy="250" r="70" fill="#141824" stroke="#FFB3B3" stroke-width="2"/>
  <text x="380" y="245"
        fill="#FFB3B3"
        font-family="system-ui"
        font-size="28"
        text-anchor="middle">C</text>
  <text x="380" y="275"
        fill="#FFCFCF"
        font-family="system-ui"
        font-size="14"
        text-anchor="middle">Collapse Behavior</text>

  <!-- Adjacency Behavior -->
  <circle cx="600" cy="200" r="70" fill="#141824" stroke="#9BE7FF" stroke-width="2"/>
  <text x="600" y="195"
        fill="#9BE7FF"
        font-family="system-ui"
        font-size="28"
        text-anchor="middle">A</text>
  <text x="600" y="225"
        fill="#CFF4FF"
        font-family="system-ui"
        font-size="14"
        text-anchor="middle">Adjacency Behavior</text>

  <!-- Resonance Behavior -->
  <circle cx="820" cy="250" r="70" fill="#141824" stroke="#C6FF9B" stroke-width="2"/>
  <text x="820" y="245"
        fill="#C6FF9B"
        font-family="system-ui"
        font-size="28"
        text-anchor="middle">R</text>
  <text x="820" y="275"
        fill="#E4FFD0"
        font-family="system-ui"
        font-size="14"
        text-anchor="middle">Resonance Behavior</text>

  <!-- Recursive Behavior -->
  <circle cx="1040" cy="350" r="70" fill="#141824" stroke="#FFE29B" stroke-width="2"/>
  <text x="1040" y="345"
        fill="#FFE29B"
        font-family="system-ui"
        font-size="26"
        text-anchor="middle">Rᵣ</text>
  <text x="1040" y="375"
        fill="#FFF1C9"
        font-family="system-ui"
        font-size="14"
        text-anchor="middle">Recursive Behavior</text>

  <!-- Singularity Behavior -->
  <circle cx="1260" cy="500" r="70" fill="#141824" stroke="#D0B3FF" stroke-width="2"/>
  <text x="1260" y="495"
        fill="#D0B3FF"
        font-family="system-ui"
        font-size="28"
        text-anchor="middle">S</text>
  <text x="1260" y="525"
        fill="#E7D8FF"
        font-family="system-ui"
        font-size="14"
        text-anchor="middle">Singularity Behavior</text>

  <!-- Hexeract Behavior -->
  <circle cx="1040" cy="650" r="70" fill="#141824" stroke="#FFFFFF" stroke-width="2"/>
  <text x="1040" y="645"
        fill="#FFFFFF"
        font-family="system-ui"
        font-size="26"
        text-anchor="middle">H₆</text>
  <text x="1040" y="675"
        fill="#DDE1FF"
        font-family="system-ui"
        font-size="14"
        text-anchor="middle">Hexeract Behavior</text>

  <!-- Behavior Transition Arrows -->
  <line x1="260" y1="410" x2="340" y2="290"
        stroke="#C3C7FF" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="450" y1="250" x2="530" y2="220"
        stroke="#C3C7FF" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="670" y1="220" x2="750" y2="240"
        stroke="#C3C7FF" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="890" y1="280" x2="970" y2="320"
        stroke="#C3C7FF" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="1110" y1="390" x2="1210" y2="460"
        stroke="#C3C7FF" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="1200" y1="540" x2="260" y2="490"
        stroke="#C3C7FF" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Label -->
  <text x="800" y="830"
        fill="#C3C7FF"
        font-family="system-ui"
        font-size="18"
        text-anchor="middle">
    Behavior Evolution Path: 𝒜 → C → A → R → Rᵣ → S → 𝒜 (stabilized)
  </text>

</svg>
