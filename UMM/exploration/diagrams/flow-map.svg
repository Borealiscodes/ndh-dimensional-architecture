<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600">
  <style>
    .title { font: 700 22px sans-serif; fill: #111; }
    .subtitle { font: 400 15px sans-serif; fill: #333; }
    .label { font: 400 14px sans-serif; fill: #222; }
    .small { font: 400 12px sans-serif; fill: #444; }
    .band { fill: #eef3ff; stroke: #334; stroke-width: 1.5; rx: 12; }
    .node { fill: #ffffff; stroke: #555; stroke-width: 1.5; rx: 8; }
    .stillness { fill: #fff7e6; stroke: #aa7a2b; stroke-width: 1.8; rx: 14; }
    .line { stroke: #555; stroke-width: 1.5; marker-end: url(#arrow); }
    .soft { stroke: #777; stroke-width: 1.5; stroke-dasharray: 6 4; marker-end: url(#arrow); }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="50" class="title">Flow Map — Exploration Quadrant</text>
  <text x="40" y="75" class="subtitle">
    Gentle transitions between Navigation, Pacing, Flow, and Stillness
  </text>

  <!-- Navigation band -->
  <rect x="60" y="110" width="780" height="90" class="band" />
  <text x="80" y="135" class="label">NAVIGATION</text>
  <text x="80" y="155" class="small">Structural • Functional • Narrative • Node System</text>

  <rect x="90" y="165" width="150" height="40" class="node" />
  <text x="105" y="190" class="small">Structural Paths</text>

  <rect x="270" y="165" width="150" height="40" class="node" />
  <text x="285" y="190" class="small">Functional Paths</text>

  <rect x="450" y="165" width="150" height="40" class="node" />
  <text x="465" y="190" class="small">Narrative Paths</text>

  <rect x="630" y="165" width="150" height="40" class="node" />
  <text x="645" y="190" class="small">Node System</text>

  <line x1="240" y1="185" x2="270" y2="185" class="line" />
  <line x1="420" y1="185" x2="450" y2="185" class="line" />
  <line x1="600" y1="185" x2="630" y2="185" class="line" />

  <!-- Pacing band -->
  <rect x="60" y="220" width="780" height="90" class="band" />
  <text x="80" y="245" class="label">PACING MEMBRANE</text>
  <text x="80" y="265" class="small">Slow Zones • Fast Zones (Reversible) • Stillness Zones</text>

  <rect x="120" y="275" width="140" height="40" class="node" />
  <text x="135" y="300" class="small">Slow Zone</text>

  <rect x="310" y="275" width="140" height="40" class="node" />
  <text x="325" y="300" class="small">Fast Zone</text>

  <rect x="500" y="275" width="140" height="40" class="node" />
  <text x="515" y="300" class="small">Slow Zone</text>

  <line x1="260" y1="295" x2="310" y2="295" class="soft" />
  <line x1="450" y1="295" x2="500" y2="295" class="soft" />

  <!-- Flow band -->
  <rect x="60" y="330" width="780" height="90" class="band" />
  <text x="80" y="355" class="label">FLOW MEMBRANE</text>
  <text x="80" y="375" class="small">Transition Zones • Continuity Zones • Dissolution Zones</text>

  <rect x="120" y="385" width="140" height="40" class="node" />
  <text x="135" y="410" class="small">Transition Zone</text>

  <rect x="310" y="385" width="140" height="40" class="node" />
  <text x="325" y="410" class="small">Continuity Zone</text>

  <rect x="500" y="385" width="140" height="40" class="node" />
  <text x="515" y="410" class="small">Dissolution Zone</text>

  <line x1="260" y1="405" x2="310" y2="405" class="soft" />
  <line x1="450" y1="405" x2="500" y2="405" class="soft" />

  <!-- Governance band -->
  <rect x="60" y="440" width="780" height="70" class="band" />
  <text x="80" y="465" class="label">GOVERNANCE</text>
  <text x="80" y="485" class="small">
    Charting Paths • Override • Integration • Coherence & Integrity
  </text>

  <!-- Stillness -->
  <rect x="360" y="520" width="180" height="40" class="stillness" />
  <text x="385" y="545" class="label">STILLNESS</text>
  <text x="385" y="562" class="small">Universal reset and integration point</text>

  <!-- Gentle flows to Stillness -->
  <line x1="570" y1="295" x2="450" y2="520" class="soft" />
  <line x1="570" y1="405" x2="450" y2="520" class="soft" />
  <line x1="705" y1="185" x2="450" y2="520" class="soft" />
</svg>
