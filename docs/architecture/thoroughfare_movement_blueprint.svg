<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700">
  <style>
    .bg { fill: #061727; }
    .layer-box { fill: none; stroke: #5fb3ff; stroke-width: 2; }
    .connector { stroke: #5fb3ff; stroke-width: 2; marker-end: url(#arrow); }
    .text { fill: #e6f3ff; font-family: "Segoe UI", sans-serif; font-size: 20px; }
    .title { fill: #e6f3ff; font-family: "Segoe UI", sans-serif; font-size: 28px; font-weight: bold; }
    .subtitle { fill: #9fd0ff; font-family: "Segoe UI", sans-serif; font-size: 18px; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5fb3ff" />
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="1200" height="700" />

  <!-- Title -->
  <text class="title" x="60" y="70">
    Thoroughfare — Movement‑Only Architectural Blueprint
  </text>
  <text class="subtitle" x="60" y="105">
    Pure movement grammar: Corridors, Braid, Weave.
  </text>

  <!-- Movement Layer Box -->
  <rect class="layer-box" x="80" y="150" width="1040" height="400" />
  <text class="text" x="100" y="185">Movement Layer — Thoroughfare</text>

  <!-- Movement components -->
  <text class="text" x="160" y="260">Corridors</text>
  <text class="text" x="540" y="260">Braid</text>
  <text class="text" x="920" y="260">Weave</text>

  <!-- Corridors description -->
  <text class="text" x="120" y="320" font-size="16">
    Linear precedence • Stable paths • Deterministic movement
  </text>

  <!-- Braid description -->
  <text class="text" x="500" y="320" font-size="16">
    Interwoven support • Multi‑perspective movement • Non‑recursive
  </text>

  <!-- Weave description -->
  <text class="text" x="880" y="320" font-size="16">
    Distributed mesh • Multi‑node flow • Conceptual expansion
  </text>

  <!-- Interaction arrows -->
  <line class="connector" x1="200" y1="280" x2="540" y2="280" />
  <text class="text" x="330" y="260" font-size="16">Corridors → Braid</text>

  <line class="connector" x1="580" y1="280" x2="920" y2="280" />
  <text class="text" x="700" y="260" font-size="16">Braid → Weave</text>

  <line class="connector" x1="920" y1="300" x2="200" y2="300" />
  <text class="text" x="500" y="340" font-size="16">Weave → Corridors (stability loop)</text>
</svg>

