<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg">

  <!-- FRAME -->
  <rect x="20" y="20" width="860" height="560"
        stroke="#444" fill="none" stroke-width="2" />
  <text x="40" y="60" font-size="28" font-family="monospace">
    Safe Exploration Protocol v1.0
  </text>

  <!-- NODES -->
  <rect x="80" y="120" width="300" height="60"
        stroke="#666" fill="#f8f8f8" />
  <text x="100" y="160" font-size="20" font-family="monospace">
    1. Anchor Real Bit
  </text>

  <rect x="80" y="220" width="300" height="60"
        stroke="#666" fill="#f8f8f8" />
  <text x="100" y="260" font-size="20" font-family="monospace">
    2. Allow Reflections
  </text>

  <rect x="80" y="320" width="300" height="60"
        stroke="#666" fill="#f8f8f8" />
  <text x="100" y="360" font-size="20" font-family="monospace">
    3. Observe Without Acting
  </text>

  <rect x="80" y="420" width="300" height="60"
        stroke="#666" fill="#f8f8f8" />
  <text x="100" y="460" font-size="20" font-family="monospace">
    4. Identify Brightest Reflection
  </text>

  <rect x="500" y="220" width="300" height="60"
        stroke="#666" fill="#f8f8f8" />
  <text x="520" y="260" font-size="20" font-family="monospace">
    5. Flip One Bit
  </text>

  <rect x="500" y="320" width="300" height="60"
        stroke="#666" fill="#f8f8f8" />
  <text x="520" y="360" font-size="20" font-family="monospace">
    6. Return to Stillness
  </text>

  <!-- EDGES -->
  <line x1="230" y1="180" x2="230" y2="220"
        stroke="#999" stroke-width="2" />
  <line x1="230" y1="280" x2="230" y2="320"
        stroke="#999" stroke-width="2" />
  <line x1="230" y1="380" x2="230" y2="420"
        stroke="#999" stroke-width="2" />

  <line x1="380" y1="450" x2="500" y2="250"
        stroke="#999" stroke-width="2" />
  <line x1="650" y1="280" x2="650" y2="320"
        stroke="#999" stroke-width="2" />

</svg>

