# 🖼️ **SVG Diagram (Copy‑Paste Ready)**

```svg
<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#fdfdfd"/>

  <!-- Center Stillness (Point) -->
  <circle cx="340" cy="340" r="8" fill="#333" />

  <!-- Upward Brightening (Ray) -->
  <line x1="340" y1="340" x2="340" y2="120" stroke="#4a90e2" stroke-width="6" stroke-linecap="round"/>
  <text x="350" y="130" font-size="18" fill="#4a90e2">Upward Brightening</text>

  <!-- Downward Softening (Curve) -->
  <path d="M340 340 Q 340 480 340 560" stroke="#7b8c8c" stroke-width="6" fill="none" stroke-linecap="round"/>
  <text x="350" y="560" font-size="18" fill="#7b8c8c">Downward Softening</text>

  <!-- Outward Expansion (Outward Spiral) -->
  <path d="M340 340
           m -20 0
           a 20 20 0 1 1 40 0
           a 40 40 0 1 1 -80 0
           a 60 60 0 1 1 120 0"
        stroke="#e67e22" stroke-width="4" fill="none"/>
  <text x="460" y="340" font-size="18" fill="#e67e22">Outward Expansion</text>

  <!-- Inward Stabilization (Inward Spiral) -->
  <path d="M340 340
           m 60 0
           a 60 60 0 1 0 -120 0
           a 40 40 0 1 0 80 0
           a 20 20 0 1 0 -40 0"
        stroke="#9b59b6" stroke-width="4" fill="none"/>
  <text x="200" y="340" font-size="18" fill="#9b59b6">Inward Stabilization</text>

  <!-- Lateral Drift (Wave) -->
  <path d="M140 340
           q 50 -40 100 0
           t 100 0
           t 100 0
           t 100 0"
        stroke="#2ecc71" stroke-width="6" fill="none" stroke-linecap="round"/>
  <text x="140" y="310" font-size="18" fill="#2ecc71">Lateral Drift</text>

</svg>
```

