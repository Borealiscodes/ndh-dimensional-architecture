<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 800">

  <!-- Central awareness node -->
  <circle cx="400" cy="400" r="40"
          fill="white" stroke="black" />
  <text x="390" y="405">{CENTER_NODE_LABEL}</text>

  <!-- Faded axis labels (non-dual collapse) -->
  <text x="100" y="120" fill="gray" opacity="0.3">{AXIS_X1_LABEL}</text>
  <text x="700" y="120" fill="gray" opacity="0.3">{AXIS_X2_LABEL}</text>
  <text x="100" y="720" fill="gray" opacity="0.3">{AXIS_X3_LABEL}</text>
  <text x="700" y="720" fill="gray" opacity="0.3">{AXIS_X4_LABEL}</text>
  <text x="400" y="60"  fill="gray" opacity="0.3">{AXIS_X5_LABEL}</text>
  <text x="400" y="780" fill="gray" opacity="0.3">{AXIS_X6_LABEL}</text>

</svg>
