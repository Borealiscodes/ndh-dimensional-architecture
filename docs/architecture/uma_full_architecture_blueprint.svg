<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000">
  <style>
    .bg { fill: #061727; }
    .layer-box { fill: none; stroke: #5fb3ff; stroke-width: 2; }
    .connector { stroke: #5fb3ff; stroke-width: 2; marker-end: url(#arrow); }
    .text { fill: #e6f3ff; font-family: "Segoe UI", sans-serif; font-size: 20px; }
    .title { fill: #e6f3ff; font-family: "Segoe UI", sans-serif; font-size: 30px; font-weight: bold; }
    .subtitle { fill: #9fd0ff; font-family: "Segoe UI", sans-serif; font-size: 18px; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5fb3ff" />
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="1400" height="1000" />

  <!-- Title -->
  <text class="title" x="60" y="80">
    UMA‑Universal — Full Meta‑Architecture Blueprint
  </text>
  <text class="subtitle" x="60" y="115">
    Thoroughfare (movement), Cosmology Engine (runtime), Meta Behavior (behavior) with explicit interaction lines.
  </text>

  <!-- Layer: Thoroughfare (Movement) -->
  <rect class="layer-box" x="80" y="160" width="1240" height="200" />
  <text class="text" x="100" y="195">Thoroughfare — Movement Layer</text>

  <text class="text" x="160" y="240">Corridors</text>
  <text class="text" x="640" y="240">Braid</text>
  <text class="text" x="1080" y="240">Weave</text>

  <text class="text" x="140" y="280" font-size="16">
    Linear precedence • Stable paths • Deterministic movement
  </text>
  <text class="text" x="620" y="280" font-size="16">
    Interwoven support • Multi‑perspective movement • Non‑recursive
  </text>
  <text class="text" x="1040" y="280" font-size="16">
    Distributed mesh • Multi‑node flow • Conceptual expansion
  </text>

  <!-- Layer: Cosmology Engine (Runtime) -->
  <rect class="layer-box" x="80" y="400" width="1240" height="200" />
  <text class="text" x="100" y="435">Cosmology Engine — Runtime Layer</text>

  <text class="text" x="160" y="480">State</text>
  <text class="text" x="640" y="480">Flow</text>
  <text class="text" x="1080" y="480">Transition</text>

  <text class="text" x="140" y="520" font-size="16">
    Runtime conditions • Non‑origin state • Stable context
  </text>
  <text class="text" x="620" y="520" font-size="16">
    Non‑pursuit flow • Movement through states • Continuous runtime
  </text>
  <text class="text" x="1040" y="520" font-size="16">
    Non‑hierarchical transitions • Reconfiguration • Phase shifts
  </text>

  <!-- Layer: Meta Behavior (Behavior) -->
  <rect class="layer-box" x="80" y="640" width="1240" height="200" />
  <text class="text" x="100" y="675">Meta Behavior — Behavioral Layer</text>

  <text class="text" x="160" y="720">Emergence</text>
  <text class="text" x="640" y="720">Structure</text>
  <text class="text" x="1080" y="720">Absurdity</text>

  <text class="text" x="140" y="760" font-size="16">
    New behavior from interactions • Pattern surfacing
  </text>
  <text class="text" x="620" y="760" font-size="16">
    Evolving forms • Runtime‑informed organization
  </text>
  <text class="text" x="1040" y="760" font-size="16">
    Revealed metaphors • Non‑literal insight • Edge‑case meaning
  </text>

  <!-- Global connectors -->
  <line class="connector" x1="720" y1="360" x2="720" y2="400" />
  <text class="text" x="740" y="385" font-size="16">Movement → Runtime</text>

  <line class="connector" x1="720" y1="600" x2="720" y2="640" />
  <text class="text" x="740" y="625" font-size="16">Runtime → Behavior</text>

  <!-- Specific cross‑layer connectors -->

  <!-- Corridors → State -->
  <line class="connector" x1="180" y1="260" x2="180" y2="460" />
  <text class="text" x="200" y="365" font-size="16">Corridors → State</text>

  <!-- Braid → Flow -->
  <line class="connector" x1="660" y1="260" x2="660" y2="460" />
  <text class="text" x="680" y="365" font-size="16">Braid → Flow</text>

  <!-- Weave → Transition -->
  <line class="connector" x1="1100" y1="260" x2="1100" y2="460" />
  <text class="text" x="1120" y="365" font-size="16">Weave → Transition</text>

  <!-- State → Emergence -->
  <line class="connector" x1="180" y1="500" x2="180" y2="700" />
  <text class="text" x="200" y="605" font-size="16">State → Emergence</text>

  <!-- Flow → Structure -->
  <line class="connector" x1="660" y1="500" x2="660" y2="700" />
  <text class="text" x="680" y="605" font-size="16">Flow → Structure</text>

  <!-- Transition → Absurdity -->
  <line class="connector" x1="1100" y1="500" x2="1100" y2="700" />
  <text class="text" x="1120" y="605" font-size="16">Transition → Absurdity</text>
</svg>

